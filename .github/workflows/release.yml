name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: [self-hosted, linux]
    env:
      PATH: /usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install latest Go
        run: |
          set -euo pipefail
          # Resolve the newest stable Go from the authoritative endpoint the Go
          # toolchain itself uses (returns e.g. "go1.26.3" on the first line).
          resp="$(curl -fsSL 'https://go.dev/VERSION?m=text')"
          latest="${resp%%$'\n'*}"
          echo "Latest stable Go: ${latest}"

          # Skip the download when /usr/local/go is already that version.
          if command -v go >/dev/null 2>&1 && [ "$(go version | awk '{print $3}')" = "${latest}" ]; then
            echo "Runner already has ${latest}; nothing to do."
            exit 0
          fi

          # Toolchain must match the RUNNER's architecture (it has to run here);
          # the build step still cross-targets linux/amd64 regardless.
          case "$(uname -m)" in
            x86_64)         goarch=amd64 ;;
            aarch64|arm64)  goarch=arm64 ;;
            *) echo "unsupported runner arch: $(uname -m)" >&2; exit 1 ;;
          esac

          tmp="$(mktemp -d)"
          curl -fsSL -o "${tmp}/go.tar.gz" "https://go.dev/dl/${latest}.linux-${goarch}.tar.gz"

          # Replace /usr/local/go in place — it is already first on PATH (see the
          # job-level env above), so no PATH juggling is needed. Use sudo only if
          # /usr/local isn't directly writable by the runner user.
          sudo_cmd=""
          [ -w /usr/local ] || sudo_cmd="sudo"
          ${sudo_cmd} rm -rf /usr/local/go
          ${sudo_cmd} tar -C /usr/local -xzf "${tmp}/go.tar.gz"
          rm -rf "${tmp}"

      - name: Verify Go version
        run: go version

      - name: Configure Go environment
        run: |
          set -euo pipefail
          # The job-level env pins PATH but doesn't carry HOME, and this
          # self-hosted runner runs without one. Go then can't derive its
          # defaults ($HOME/go for GOPATH, $HOME/.cache/go-build for GOCACHE)
          # and aborts with "neither GOMODCACHE nor GOPATH is set". Pin them to
          # a writable base — the runner user's HOME when present, otherwise the
          # Actions-provided RUNNER_TEMP (always set and writable) — and export
          # to $GITHUB_ENV so the build and test steps inherit them.
          base="${HOME:-${RUNNER_TEMP:?RUNNER_TEMP unset}}"
          mkdir -p "${base}/go/pkg/mod" "${base}/.cache/go-build"
          {
            echo "GOPATH=${base}/go"
            echo "GOMODCACHE=${base}/go/pkg/mod"
            echo "GOCACHE=${base}/.cache/go-build"
          } >> "$GITHUB_ENV"
          echo "Using Go cache base: ${base}"

      - name: Build Linux binary
        run: |
          mkdir -p dist
          # Strip the leading "v" from the tag (v6.6.2 -> 6.6.2) so the baked
          # version compares cleanly against GitHub release tags.
          VERSION="${GITHUB_REF_NAME#v}"
          # CGO_ENABLED=0  -> fully static binary (no libc dependency), so a
          #                  release built on the runner runs on any target host
          #                  regardless of its glibc version. The app's os/user
          #                  and net lookups fall back to pure-Go (local
          #                  /etc/passwd + Go resolver), which is what this NAS
          #                  uses.
          # -trimpath      -> reproducible builds; no runner filesystem paths
          #                  leaked into the binary.
          # -X internal/version.Version -> actually inject the version (the old
          #                  -X main.version was a no-op: there is no
          #                  main.version, and version.Version was a const).
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -v -trimpath \
            -ldflags="-s -w -X zfsnas/internal/version.Version=${VERSION}" \
            -o dist/zfsnas-chezmoi .
          echo "Built version: ${VERSION}"

      - name: Run tests
        run: go test ./...

      - name: Install cosign
        run: |
          curl -sSL -o /tmp/cosign \
            https://github.com/sigstore/cosign/releases/download/v2.4.3/cosign-linux-amd64
          chmod +x /tmp/cosign
          /tmp/cosign version

      - name: Sign release binary
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          # Write private key from secret to a temp file
          printf '%s' "${{ secrets.CODE_SIGN_PRIVATE_KEY }}" > /tmp/cosign.key

          # Sign the binary directly
          /tmp/cosign sign-blob \
            --key /tmp/cosign.key \
            --output-signature dist/zfsnas-chezmoi.sig \
            --tlog-upload=false \
            dist/zfsnas-chezmoi

          # Clean up private key immediately
          rm -f /tmp/cosign.key

          echo "=== Signature (base64) ==="
          cat dist/zfsnas-chezmoi.sig

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/zfsnas-chezmoi
            dist/zfsnas-chezmoi.sig
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
