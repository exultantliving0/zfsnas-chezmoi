<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500">

  <defs>
    <!-- Neon glow filters -->
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowViolet" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00eaff"/>
      <stop offset="100%" stop-color="#8a2cff"/>
    </linearGradient>
  </defs>

  <!-- SERVER RACK ICON -->
  <g transform="translate(80,70)">

    <!-- Rack frame -->
    <rect x="0" y="0" width="220" height="360" rx="20"
          fill="none"
          stroke="url(#neonGradient)"
          stroke-width="6"
          filter="url(#glowCyan)"/>

    <!-- Server units -->
    <rect x="30" y="50" width="160" height="40" rx="6"
          fill="none"
          stroke="#00eaff"
          stroke-width="4"
          filter="url(#glowCyan)"/>

    <rect x="30" y="140" width="160" height="40" rx="6"
          fill="none"
          stroke="#8a2cff"
          stroke-width="4"
          filter="url(#glowViolet)"/>

    <rect x="30" y="230" width="160" height="40" rx="6"
          fill="none"
          stroke="#00eaff"
          stroke-width="4"
          filter="url(#glowCyan)"/>

    <!-- status LEDs -->
    <circle cx="50" cy="70" r="4" fill="#00eaff"/>
    <circle cx="50" cy="160" r="4" fill="#8a2cff"/>
    <circle cx="50" cy="250" r="4" fill="#00eaff"/>

  </g>

  <!-- TEXT -->
  <g font-family="Segoe UI, Roboto, Arial, sans-serif">

    <text x="420" y="290"
          font-size="240"
          font-weight="700"
          fill="url(#neonGradient)">
      ZNAS
    </text>

    <text x="420" y="420"
          font-size="70"
          font-weight="500"
          fill="#bbbbbb"
          letter-spacing="6">
      CHEZMOI
    </text>

  </g>

</svg>
